<div class="h-screen w-screen flex items-center justify-center bg-[#f7f1e3]">
  <div
    class="w-[420px] bg-white rounded-2xl shadow-xl px-10 py-8 relative"
    style="box-shadow: 0 20px 40px rgba(15, 23, 42, 0.18);"
  >
    <h1 class="text-2xl font-semibold text-slate-900 text-center mb-1">Connexion</h1>
    <p class="text-xs text-slate-500 text-center mb-6">
      Accès réservé aux administrateurs
    </p>

    <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1.5 text-sm">
        <label class="text-slate-700">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          class="h-10 rounded-md border border-slate-200 px-3 text-sm outline-none focus:ring-2 focus:ring-primary/60 focus:border-primary"
        />
      </div>

      <div class="flex flex-col gap-1.5 text-sm">
        <label class="text-slate-700">Mot de passe</label>
        <div class="flex items-center h-10 rounded-md border border-slate-200 px-3">
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            class="flex-1 bg-transparent outline-none text-sm"
          />
          <span class="text-slate-400 text-xs cursor-pointer select-none">👁</span>
        </div>
      </div>

      <div class="flex items-center justify-between text-xs text-slate-600">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" class="rounded border-slate-300" />
          <span>Rester connecté</span>
        </label>
        <a class="text-primary hover:underline cursor-pointer">Mot de passe oublié</a>
      </div>

      <button
        type="submit"
        [disabled]="isLoading()"
        class="mt-2 h-10 rounded-md bg-primary text-white text-sm font-semibold shadow-md hover:bg-blue-700 transition-colors"
      >
        {{ isLoading() ? 'Connexion...' : 'Se connecter' }}
      </button>

      <p *ngIf="errorMessage()" class="text-xs text-red-600 -mt-1">
        {{ errorMessage() }}
      </p>
    </form>

    <div class="mt-5 text-[11px] text-slate-600 bg-slate-50 rounded-md px-3 py-2">
      Pour obtenir un compte, contactez l'administrateur de la plateforme.
    </div>
  </div>
</div>
