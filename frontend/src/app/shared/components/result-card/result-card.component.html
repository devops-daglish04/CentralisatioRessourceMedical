<article
  class="bg-white rounded-2xl shadow-sm border border-slate-100 px-5 py-4 mb-4 flex flex-col gap-2"
>
  <div class="flex items-start justify-between gap-2">
    <div>
      <h3 class="text-base font-semibold text-slate-900">
        {{ structure.name }}
      </h3>
      <p class="text-xs text-slate-500 mt-0.5">
        {{ structure.address }}
      </p>
    </div>
    <div class="text-sm font-semibold text-slate-700 whitespace-nowrap">
      {{ structure.distance | number : '1.1-1' }} km
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-2 mt-1">
    <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700">
      Disponible
    </span>
    <ng-container *ngFor="let resource of visibleResources(); trackBy: trackByResource">
      <span
        class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-slate-100 text-slate-700"
      >
        {{ resource.resource_type }} · {{ resource.name_or_group }} ({{ resource.quantity }}
        {{ resource.unit }})
      </span>
    </ng-container>
    <span
      *ngIf="hiddenResourcesCount() > 0"
      class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-slate-100 text-slate-700"
    >
      +{{ hiddenResourcesCount() }} autres
    </span>
  </div>

  <div class="flex items-center justify-between mt-3">
    <button
      type="button"
      class="px-4 py-2 rounded-full bg-primary text-white text-xs font-semibold shadow-sm hover:bg-blue-700 transition-colors"
      (click)="onVoirSurCarte()"
    >
      Voir sur la carte
    </button>
    <button
      type="button"
      class="px-4 py-2 rounded-full border border-slate-300 text-xs font-medium text-slate-700 hover:bg-slate-50 transition-colors"
    >
      Itinéraire
    </button>
  </div>
</article>
