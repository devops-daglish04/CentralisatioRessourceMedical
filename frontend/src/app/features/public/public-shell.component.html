<div class="flex flex-col h-screen overflow-hidden">
  <app-navbar (requestLocate)="onLocateUser()"></app-navbar>

  <main class="flex flex-col lg:flex-row flex-1 overflow-hidden bg-[color:var(--color-background)] px-4 lg:px-6 pb-4 lg:pb-6 pt-3 lg:pt-4 gap-3 lg:gap-0">
    <!-- Left panel: results -->
    <section class="w-full lg:w-1/3 lg:pr-4 flex flex-col h-full min-h-0">
      <header class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-slate-900">Ressources proches</h2>
        <span class="text-xs text-slate-500">
          {{ results().length }} résultats
        </span>
      </header>

      <div class="flex items-center gap-2 mb-3 text-xs">
        <button class="px-3 py-1 rounded-full bg-primary text-white font-medium shadow-sm">
          Sang
        </button>
        <button class="px-3 py-1 rounded-full bg-slate-100 text-slate-700 border border-slate-200">
          &lt; 10 km
        </button>
        <button class="px-3 py-1 rounded-full bg-slate-100 text-slate-700 border border-slate-200">
          Ouvert maintenant
        </button>
      </div>

      <div class="flex-1 overflow-y-auto pr-1 min-h-0">
        <ng-container *ngIf="!isLoading(); else loadingTpl">
          <app-result-card
            *ngFor="let structure of results(); trackBy: trackById"
            [structure]="structure"
            (focusOnMap)="onFocus($event)"
          ></app-result-card>
        </ng-container>
        <ng-template #loadingTpl>
          <div class="flex items-center justify-center h-full text-slate-500 text-sm">
            Chargement des structures...
          </div>
        </ng-template>
      </div>
    </section>

    <!-- Right panel: map -->
    <section class="w-full lg:w-2/3 h-[45vh] lg:h-full min-h-[320px]">
      <app-map
        [structures]="results()"
        [focusStructureId]="focusedId()"
        [userLocation]="userLocation()"
      ></app-map>
    </section>
  </main>
</div>
