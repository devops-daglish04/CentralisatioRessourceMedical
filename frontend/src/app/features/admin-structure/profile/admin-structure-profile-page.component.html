<section class="card">
  <h2>Profil structure</h2>

  <div *ngIf="isLoading()" class="state">Chargement...</div>

  <form *ngIf="!isLoading()" (ngSubmit)="onSubmit()" class="form">
    <label>
      Nom
      <input type="text" name="name" [(ngModel)]="form.name" />
    </label>

    <label>
      Type
      <select name="type" [(ngModel)]="form.type">
        <option value="Hopital">Hopital</option>
        <option value="Clinique">Clinique</option>
        <option value="Pharmacie">Pharmacie</option>
        <option value="Banque">Banque de sang</option>
      </select>
    </label>

    <label class="full">
      Adresse
      <input type="text" name="address" [(ngModel)]="form.address" />
    </label>

    <label>
      Téléphone
      <input type="text" name="contact_phone" [(ngModel)]="form.contact_phone" />
    </label>

    <label>
      Latitude
      <input type="number" step="0.0001" name="latitude" [(ngModel)]="form.latitude" />
    </label>

    <label>
      Longitude
      <input type="number" step="0.0001" name="longitude" [(ngModel)]="form.longitude" />
    </label>

    <label class="checkbox full">
      <input type="checkbox" name="is_active" [(ngModel)]="form.is_active" />
      Structure active
    </label>

    <button type="submit" [disabled]="isSaving()">
      {{ isSaving() ? 'Mise à jour...' : 'Enregistrer' }}
    </button>
  </form>

  <p *ngIf="message()" class="message">{{ message() }}</p>
</section>
